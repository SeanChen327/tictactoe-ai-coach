# render.yaml
services:
  - type: web
    name: tictactoe-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # [NEW] Lock Python runtime to match GitHub Actions CI pipeline (3.10)
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: DATABASE_URL
        fromDatabase:
          name: tictactoe-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: psql
    name: tictactoe-db
    plan: free
