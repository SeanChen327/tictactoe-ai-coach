# .github/workflows/production-deploy.yml
# ---------------------------------------------------------
# Project: Gomoku AI Coach (15x15)
# Feature: Continuous Deployment (CD) to Render
# ---------------------------------------------------------

name: Production Deployment (CD)

# 触发条件：只有当代码正式 Push/Merge 到 main 分支时才触发
on:
  push:
    branches: [main]

jobs:
  verify-production-readiness:
    name: 🧪 Pre-Deploy Verification
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      SECRET_KEY: "ci-test-temporary-secret-key"
      DATABASE_URL: "sqlite:///./test.db"
      MOCK_AI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # 👇 [核心修复]：补齐 CD 流水线缺失的浏览器内核安装步骤
      - name: 🎭 Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: 🚀 Start Test Server
        run: |
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &

      - name: 💓 Health Check Polling
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/api/health | grep "online"; then exit 0; fi
            sleep 1
          done
          exit 1

      - name: 🧪 Execute Core Tests
        run: python -m pytest tests/ -v -W ignore::DeprecationWarning

  # 阶段二：受控部署 (仅在阶段一成功后执行)
  deploy-to-render:
    name: 🚀 Trigger Render Deployment
    runs-on: ubuntu-latest
    needs: verify-production-readiness # 【安全锁】：依赖上一步成功
    steps:
      - name: 🌐 Call Render Deploy Hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "❌ Error: RENDER_DEPLOY_HOOK_URL secret is missing!"
            exit 1
          fi
          echo "✅ All tests passed. Triggering secure deployment to Render..."
          curl -X POST "$DEPLOY_HOOK"
          echo -e "\n🎉 Deployment signal sent successfully."
