# .github/workflows/pr-integrity-check.yml
# ---------------------------------------------------------
# Project: Gomoku AI Coach (15x15)
# Feature: PR Integrity & Security Gate (SAST + Integration + E2E)
# ---------------------------------------------------------

name: PR Integrity & Security Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch: # 允许手动触发测试

jobs:
  # 第一阶段：安全扫描 (SAST)
  security-sast:
    name: 🛡️ Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install Security Tools
        run: pip install bandit

      - name: 🔍 Run Bandit Analysis
        # 扫描代码中的安全漏洞（如硬编码密钥、不安全的函数调用）
        # -r: 递归扫描, -x: 排除测试文件夹, -ll: 只报告中高级风险
        run: bandit -r . -x ./tests -ll

  # 第二阶段：集成测试、E2E 测试与 AI 质量审计
  integrity-and-ai-qa:
    name: 🧪 Integrity & E2E QA
    runs-on: ubuntu-latest
    needs: security-sast # 只有安全扫描通过后才运行
    env:
      # 从 GitHub Secrets 注入生产级 API 密钥
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      SECRET_KEY: "ci-test-temporary-secret-key"
      DATABASE_URL: "sqlite:///./test.db" # CI 使用临时 SQLite 数据库
      MOCK_AI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # 👇 [新增的核心修复] 安装 Playwright 及其系统级依赖 (Chromium内核)
      - name: 🎭 Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: 🚀 Start FastAPI Server (Background)
        # 使用 nohup 将服务器挂载到后台运行，并将日志重定向
        run: |
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          echo "Server process ID: $!"

      - name: 💓 Health Check Polling
        # 关键步骤：轮询 /api/health 确保服务器已完全就绪
        run: |
          echo "Waiting for server to respond..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/api/health | grep "online"; then
              echo "✅ Server is UP and Healthy!"
              exit 0
            fi
            echo "Still waiting... ($i/30)"
            sleep 1
          done
          echo "❌ Error: Server failed to start within 30s. Logs below:"
          cat server.log
          exit 1

      - name: 🧪 Execute Automated QA Suite
        # 运行包含 LangChain Judge, API 集成测试, 和 Playwright E2E 的自动化测试
        run: |
          python -m pytest tests/ -v -W ignore::DeprecationWarning

      - name: 📜 Archive Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-error-logs
          path: server.log
